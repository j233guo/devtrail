<section class="toast-container" aria-live="polite" aria-label="Notifications">
  @for (toast of toastService.toasts(); track toast.id) {
    <article class="toast" [class]="'toast toast--' + toast.type">
      <div class="toast-content">
        @if (toast.title) {
          <strong>{{ toast.title }}</strong>
        }
        <p>{{ toast.message }}</p>
      </div>

      <button type="button" aria-label="Dismiss notification" (click)="dismissToast(toast)">
        x
      </button>
    </article>
  }
</section>
