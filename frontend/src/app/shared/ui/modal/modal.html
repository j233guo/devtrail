@if (open()) {
  <div class="modal-backdrop" role="presentation" (click)="requestClose()">
    <section
      class="modal-panel"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="title()"
      (click)="$event.stopPropagation()"
    >
      <header class="modal-header">
        <h2>{{ title() }}</h2>
        <button class="modal-close" type="button" aria-label="Close dialog" (click)="requestClose()">
          x
        </button>
      </header>

      <div class="modal-content">
        <ng-content />
      </div>
    </section>
  </div>
}
