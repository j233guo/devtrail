<main class="page-shell">
  <section class="hero" aria-labelledby="app-title">
    <p class="eyebrow">Local workspace</p>
    <h1 id="app-title">DevTrail</h1>
    <p class="subtitle">Local-first AI development workspace</p>

    <div class="status-panel" aria-live="polite">
      <div class="panel-header">
        <span class="status-dot" [class.status-dot--ok]="health()" [class.status-dot--error]="error()"></span>
        <h2>Backend status</h2>
      </div>

      @if (isLoading()) {
        <p class="status-message">Checking backend health...</p>
      } @else if (error()) {
        <p class="status-message status-message--error">{{ error() }}</p>
      } @else if (health(); as backendHealth) {
        <dl class="status-list">
          <div>
            <dt>Status</dt>
            <dd>{{ backendHealth.status }}</dd>
          </div>
          <div>
            <dt>Service</dt>
            <dd>{{ backendHealth.service }}</dd>
          </div>
        </dl>
      }
    </div>
  </section>
</main>
